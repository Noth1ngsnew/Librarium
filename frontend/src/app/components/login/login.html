<div class="login-container">
  <div class="login-card">
    <h1>Librarium</h1>
    <h2>{{ isRegister() ? 'Register' : 'Login' }}</h2>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="formData.username" placeholder="Enter username" />
    </div>

    @if (isRegister()) {
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="formData.email" placeholder="Enter email" />
      </div>
    }

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="formData.password" placeholder="Enter password" />
    </div>

    <button class="btn-primary" (click)="submit()">
      {{ isRegister() ? 'Register' : 'Login' }}
    </button>

    <p class="toggle-text">
      {{ isRegister() ? 'Already have an account?' : "Don't have an account?" }}
      <span (click)="toggleMode()">{{ isRegister() ? 'Login' : 'Register' }}</span>
    </p>
  </div>
</div>
